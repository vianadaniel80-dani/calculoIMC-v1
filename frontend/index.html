<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./script.js"></script>

    <title>Calculadora de IMC</title>
  </head>
  <body>
    <div class="container mt-5">
      <h1 class="text-center mb-4">Calculadora de IMC</h1>
      <form id="imcForm" class="mb-4" onsubmit="calculateIMC(event)">
        <div class="mb-3">
          <label for="peso" class="form-label">Peso (kg)</label>
          <input type="number" step="0.1" class="form-control" id="peso" required placeholder="Ex: 85.5" />
        </div>
        <div class="mb-3">
          <label for="altura" class="form-label">Altura (m)</label>
          <input type="number" step="0.01" class="form-control" id="altura" required placeholder="Ex: 1.80" />
        </div>
        <div class="mb-3">
          <button type="submit" class="btn btn-primary">Calcular IMC</button>
        </div>
      </form>
      <div id="result" class="alert alert-info d-none"></div>
    </div>
  </body>
</html>
